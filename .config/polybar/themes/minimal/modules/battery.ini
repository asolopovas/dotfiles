[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
full-at = 98

format-charging = <ramp-capacity> <label-charging>
format-charging-padding = 1
format-charging-foreground = ${colors.fg-alt}
label-charging = %{T2}%percentage%%%{T-}
label-charging-padding = 1

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-padding = 1
format-discharging-foreground = ${colors.fg-alt}
label-discharging = %{T2}%percentage%%%{T-}
label-discharging-padding = 1

format-full = <ramp-capacity> <label-full>
format-full-padding = 1
format-full-foreground = ${colors.fg-alt}
label-full = %{T2}%percentage%%%{T-}
label-full-padding = 1

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁾
ramp-capacity-4 = 󰂀
ramp-capacity-5 = 󰂂
ramp-capacity-6 = 󰁹
