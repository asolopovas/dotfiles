[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
full-at = 98

format-charging = <ramp-capacity><label-charging>
format-charging-foreground = #ffffff

format-discharging = <ramp-capacity><label-discharging>
format-discharging-foreground = #ffffff

format-full = <ramp-capacity><label-full>
format-full-foreground = #ffffff

label-charging = %{T2} %percentage%%%{T-}
label-discharging = %{T2} %percentage%%%{T-}
label-full = %{T2} %percentage%%%{T-}

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁾
ramp-capacity-4 = 󰂀
ramp-capacity-5 = 󰂂
ramp-capacity-6 = 󰁹
ramp-capacity-foreground = #ffffff
