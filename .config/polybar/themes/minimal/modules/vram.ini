[module/vram]
type = custom/script
exec = /home/andrius/dotfiles/scripts/ui-polybar-vram.sh
interval = 3

; Available tags:
;   <label> (default)
format = <label>
format-prefix = %{T13}%{T-}
format-prefix-foreground = #ffffff

; Available tokens:
;   %output% (script output)
label = " %output%"

; Format used when script returns an error
;format-fail = <label-fail>
;label-fail = VRAM N/A