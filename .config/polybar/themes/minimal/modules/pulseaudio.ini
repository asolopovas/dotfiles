[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume = <label-volume>
format-volume-padding = 0
format-volume-prefix = %{T13}%{T-}
format-volume-prefix-foreground = #ffffff
format-volume-suffix = "%{F#555555} |%{F-}"
label-volume = " %{T2}%percentage%%%{T-}"
label-volume-padding = 0

format-muted = <label-muted>
format-muted-foreground = ${colors.red}
format-muted-padding = 0
format-muted-prefix = %{T13}%{T-}
format-muted-prefix-foreground = ${colors.red}
format-muted-suffix = "%{F#555555} |%{F-}"
label-muted = " %{T2}%percentage%%%{T-}"
label-muted-padding = 0

click-right = pavucontrol&
