;   To learn more about how to configure Polybar
;   go to https://github.com/polybar/polybar

include-file = $CONFIG_DIR/themes/minimal/include-modules.ini

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = ${env:POLYBAR_HEIGHT:30}
offset-y = 0
offset-x = 0
bottom = false
fixed-center = true

padding-left = 0
padding-right = 0
module-margin-left = 1
module-margin-right = 0

wm-restack = generic

override-redirect = false

scroll-up = next
scroll-down = prev

enable-ipc = true

background = ${colors.semi-trans-black}
foreground = ${colors.fg}

tray-position = right
tray-padding = 2
tray-maxsize = 16
tray-background = ${colors.semi-trans-black}
tray-foreground = ${colors.fg}

include-file = $CONFIG_DIR/fonts.ini
include-file = $CONFIG_DIR/modules.ini

cursor-click = pointer
cursor-scroll = default

[bar/secondary]
inherit = bar/main
tray-position = none
modules-left = xmonad title
modules-center =
modules-right = date

[settings]
screenchange-reload = true
